name: "build"
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Pull pre-built Docker image
        run: docker pull ghcr.io/essharom/gnn-suite:latest

      - name: Cache Nextflow and setup installation
        id: nextflow-cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/bin/nextflow
            ~/.nextflow
          key: ${{ runner.os }}-nextflow-${{ env.NEXTFLOW_VERSION }}
          restore-keys: |
            ${{ runner.os }}-nextflow-

      - name: Install Nextflow if not cached
        if: steps.nextflow-cache.outputs.cache-hit != 'true'
        env:
          NEXTFLOW_VERSION: 23.04.2
        run: |
          wget -qO- https://github.com/nextflow-io/nextflow/releases/download/v${NEXTFLOW_VERSION}/nextflow | bash
          sudo mv nextflow /usr/local/bin/

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Flake8 Lint (Critical Errors)
        uses: py-actions/flake8@v2
        with:
          path: "bin"
          max-line-length: "127"
          select: "E9,F63,F7,F82"

      - name: List files in the working directory
        run: ls -alh "${{ github.workspace }}"

      - name: List available Docker images
        run: docker images

      - name: Testing Nextflow pipeline with test profile
        run: |
          chmod +x bin/*
          nextflow run . -profile test,ci,docker

      - name: Integration Test - Binary Classification
        run: |
          nextflow run . -profile test,ci,docker \
            --task-type binary \
            --geneFile testdata/genes.csv \
            --networkFile testdata/network.tsv \
            --dataSet testdata-binary \
            --epochs 10 \
            --replicates 1 \
            --enable_plots true

      - name: Integration Test - Multiclass Classification
        run: |
          nextflow run . -profile test,ci,docker \
            --task-type multiclass \
            --geneFile testdata/sfari_multiclass_genes.csv \
            --networkFile testdata/sfari_multiclass_network.tsv \
            --dataSet testdata-multiclass \
            --epochs 10 \
            --replicates 1 \
            --enable_plots true

      - name: Integration Test - Regression
        run: |
          nextflow run . -profile test,ci,docker \
            --task-type regression \
            --geneFile testdata/sfari_regression_genes.csv \
            --networkFile testdata/sfari_regression_network.tsv \
            --dataSet testdata-regression \
            --epochs 10 \
            --replicates 1 \
            --enable_plots true

      - name: Integration Test - MLflow Enabled
        run: |
          nextflow run . -profile test,ci,docker \
            --task-type binary \
            --geneFile testdata/genes.csv \
            --networkFile testdata/network.tsv \
            --dataSet testdata-mlflow \
            --epochs 10 \
            --replicates 1 \
            --with_mlflow true \
            --mlflow_tracking_uri "file:./mlruns" \
            --enable_plots true

      - name: Verify MLflow outputs
        run: |
          echo "Checking MLflow outputs..."
          ls -lh mlruns/ || echo "No mlruns directory"
          if [ ! -d "mlruns" ]; then
            echo "ERROR: MLflow tracking directory not created"
            exit 1
          fi

      - name: Hyperopt Test - Binary Classification
        run: |
          nextflow run . -entry hyperopt -profile test,ci,docker \
            --task_type binary \
            --geneFile testdata/genes.csv \
            --networkFile testdata/network.tsv \
            --dataSet testdata-binary-hyperopt \
            --models '["gcn"]'

      - name: Hyperopt Test - Multiclass Classification
        run: |
          nextflow run . -entry hyperopt -profile test,ci,docker \
            --task_type multiclass \
            --geneFile testdata/sfari_multiclass_genes.csv \
            --networkFile testdata/sfari_multiclass_network.tsv \
            --dataSet sfari-multiclass-hyperopt \
            --models '["gcn"]'

      - name: Hyperopt Test - Regression
        run: |
          nextflow run . -entry hyperopt -profile test,ci,docker \
            --task_type regression \
            --geneFile testdata/sfari_regression_genes.csv \
            --networkFile testdata/sfari_regression_network.tsv \
            --dataSet sfari-regression-hyperopt \
            --models '["gcn"]'

      - name: Verify Hyperopt outputs
        run: |
          echo "Checking hyperopt JSON outputs..."
          ls -lh results/hyperparameters/ || echo "No hyperparameters directory"

          # Check for binary hyperopt results
          if [ ! -f "results/hyperparameters/testdata-binary-hyperopt/best_trial_gcn_testdata-binary-hyperopt.json" ]; then
            echo "ERROR: Binary hyperopt results not found"
            exit 1
          fi

          # Check for multiclass hyperopt results
          if [ ! -f "results/hyperparameters/sfari-multiclass-hyperopt/best_trial_gcn_sfari-multiclass-hyperopt.json" ]; then
            echo "ERROR: Multiclass hyperopt results not found"
            exit 1
          fi

          # Check for regression hyperopt results
          if [ ! -f "results/hyperparameters/sfari-regression-hyperopt/best_trial_gcn_sfari-regression-hyperopt.json" ]; then
            echo "ERROR: Regression hyperopt results not found"
            exit 1
          fi

          echo "All hyperopt outputs verified successfully!"

      - name: Upload Test Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            results/
            mlruns/
            mlflow.db
            .nextflow.log
          retention-days: 30

      # Uncomment this section only if you need to push a new image
      # - name: Push image to GitHub Container Registry
      #   if: startsWith(github.event.ref, 'refs/tags')
      #   uses: docker/build-push-action@v2
      #   with:
      #     context: .
      #     file: containers/Dockerfile
      #     platforms: linux/amd64
      #     push: true
      #     tags: |
      #       ghcr.io/${{ github.repository }}:v0.2.21, ghcr.io/${{ github.repository }}:latest